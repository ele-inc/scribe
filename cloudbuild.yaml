steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        SECRETS=(
          ELEVENLABS_API_KEY
          SLACK_BOT_TOKEN
          DISCORD_BOT_TOKEN
          DISCORD_PUBLIC_KEY
          DISCORD_APPLICATION_ID
          GCP_PROJECT_ID
          GOOGLE_CLIENT_EMAIL
          GOOGLE_IMPERSONATE_EMAIL
          GOOGLE_PRIVATE_KEY
          GOOGLE_GENERATIVE_AI_API_KEY
          YOUTUBE_PROXY
          YOUTUBE_COOKIES_BASE64
        )

        mapping=""
        for name in "$${SECRETS[@]}"; do
          mapping+="$${name}=$${name}:latest,"
        done
        mapping="$${mapping%,}"

        gcloud run deploy scribe-bot \
          --project="$PROJECT_ID" \
          --source=. \
          --region=asia-northeast1 \
          --memory=24Gi \
          --cpu=6 \
          --timeout=3600 \
          --no-allow-unauthenticated \
          --execution-environment=gen2 \
          --cpu-boost \
          --no-cpu-throttling \
          --min-instances=0 \
          --max-instances=1 \
          --port=8080 \
          --clear-env-vars \
          --set-secrets="$${mapping}"

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 3600s
